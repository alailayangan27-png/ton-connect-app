<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    color: white;
    background: black;
}

.container {
    padding: 20px;
    text-align: center;
}

input {
    width: 80%;
    padding: 10px;
    margin-top: 20px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    margin-top: 15px;
    font-size: 16px;
    background: #0088cc;
    border: none;
    color: white;
    border-radius: 8px;
}

/* 🔥 sembunyikan wallet lain */
.tc-modal .tc-wallets-list {
    display: none !important;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Mint TAGS</h2>

<div id="ton-connect"></div>

<input id="tonAmount" placeholder="Enter TON amount">

<br>

<button onclick="setMax()">MAX</button>
<button onclick="mintTokens()">MINT</button>

<p id="tagsResult">0 TAGS</p>
<p id="status"></p>

</div>

<script src="app.js"></script>

</body>
</html>
